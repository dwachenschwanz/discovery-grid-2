name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main # or master, depends on your repo's default branch

jobs:
  build-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v5

      - name: Setup Node.js 💻
        uses: actions/setup-node@v5
        with:
          node-version: 24

      - name: Install Dependencies 📦
        run: npm ci

      - name: Build 🔧
        run: npm run build

      - name: Deploy to GitHub Pages 🚀
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist

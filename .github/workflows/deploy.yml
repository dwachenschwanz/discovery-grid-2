name: Deploy multiple branches to GitHub Pages

on:
  push:
    branches:
      - main
      - lilly
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - branch: main
            path_prefix: ""
          - branch: lilly
            path_prefix: "lilly"
          

    steps:
      - name: Checkout target branch
        uses: actions/checkout@v4
        with:
          ref: ${{ matrix.branch }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Set base path
        run: |
          REPO_NAME="${GITHUB_REPOSITORY#*/}"
          if [ -z "${{ matrix.path_prefix }}" ]; then
            echo "APP_BASE=/$REPO_NAME/" >> $GITHUB_ENV
          else
            echo "APP_BASE=/$REPO_NAME/${{ matrix.path_prefix }}/" >> $GITHUB_ENV
          fi

      - name: Build
        run: npm run build
        env:
          BASE_URL: ${{ env.APP_BASE }}

      - name: Prepare branch output
        run: |
          mkdir -p /tmp/pages-output/${{ matrix.path_prefix }}
          if [ -z "${{ matrix.path_prefix }}" ]; then
            cp -R dist/. /tmp/pages-output/
          else
            cp -R dist/. /tmp/pages-output/${{ matrix.path_prefix }}/
          fi

      - name: Upload partial artifact
        uses: actions/upload-artifact@v4
        with:
          name: pages-${{ matrix.branch }}
          path: /tmp/pages-output

  bundle:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download all partial artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Merge artifacts
        run: |
          mkdir -p final-site
          find artifacts -type f | while read file; do
            rel="${file#artifacts/*/}"
            mkdir -p "final-site/$(dirname "$rel")"
            cp "$file" "final-site/$rel"
          done

      - name: Add .nojekyll
        run: touch final-site/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: final-site

  deploy:
    runs-on: ubuntu-latest
    needs: bundle
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4